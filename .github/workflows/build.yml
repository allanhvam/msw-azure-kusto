name: Build
on: 
  - pull_request
  - workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies 🔧
        run: npm ci

      - name: Build 📦
        run: npm run build

      - name: Run tests 🧪
        run: npm test

